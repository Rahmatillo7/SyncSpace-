<!-- templates/board_detail.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{{ board.title }}</title>
</head>
<body>
    <h2>{{ board.title }}</h2>
    <p>Owner: {{ board.owner }}</p>
    <p>Participants:</p>
    <ul>
        {% for participant in board.participants.all %}
            <li>{{ participant.user.username }} - {{ participant.role }}</li>
        {% empty %}
            <li>No participants yet.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>
</body>
</html>
